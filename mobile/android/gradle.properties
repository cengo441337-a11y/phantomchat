org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Some Wave 11 deps still pull in the pre-AndroidX
# `com.android.support:support-compat` AAR. Jetifier rewrites those
# classes to AndroidX so the Duplicate-Class merge step doesn't blow up.
android.enableJetifier=true
