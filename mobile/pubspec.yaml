name: phantomchat
description: PhantomChat — decentralized encrypted messenger
publish_to: none
version: 1.0.7+8

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.4
  local_auth: ^2.3.0
  cupertino_icons: ^1.0.8
  flutter_rust_bridge: 2.12.0
  freezed_annotation: ^2.4.4
  # Wave 7B2 — pure-Dart relay client (publish + receive over Nostr WebSocket).
  path_provider: ^2.1.5
  web_socket_channel: ^3.0.1
  # Wave 8B — background relay-listener
  flutter_background_service: ^5.0.0
  flutter_local_notifications: ^17.2.2
  # Battery-optimisation opt-out flow (Settings + first-launch wizard).
  # On Xiaomi/Huawei/OnePlus/Samsung this keeps the relay/connection-keeper
  # alive across Doze; without it the OEM kills the process within minutes.
  disable_battery_optimization: ^1.1.1
  # Wave 11B — voice messages.
  # `record` 5.x writes opus-in-ogg natively on Android (uses MediaCodec
  # OPUS encoder, packaged in OGG). iOS falls back to AAC-in-m4a — the
  # wire-protocol codec_id byte tells the receiver which container to
  # hand to the playback stack. See `lib/services/voice_message.dart`.
  record: ^5.2.1
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  # Wave 11G — in-app APK auto-update.
  # `package_info_plus` reads the installed app's version (from pubspec) at
  # runtime so we can compare against the manifest's version field.
  # `device_info_plus` exposes Build.SUPPORTED_ABIS so we can pick the right
  # APK variant (arm64-v8a / armeabi-v7a / x86_64).
  # `open_filex` hands a downloaded file to the OS — on Android this triggers
  # the package-installer when the file mime is application/vnd.android.package-archive.
  package_info_plus: ^8.0.0
  device_info_plus: ^11.0.0
  open_filex: ^4.5.0
  # `crypto` is already a transitive dep (via flutter_secure_storage and
  # cryptography) — make it explicit so we can use the streaming SHA256
  # API directly in update_service.dart for chunked APK hashing.
  crypto: ^3.0.0
  cryptography_flutter: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  # End-to-end smoke tests. Drives the real app on a connected device via
  # WidgetTester so we cover platform plugins (FRB / secure_storage /
  # SharedPreferences) that pure Dart unit tests can't reach. Run with
  # `flutter test integration_test/` against a connected emulator.
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^2.5.7
  build_runner: ^2.4.13
  json_serializable: ^6.9.0

# Workaround for upstream package incompatibility:
# `record_linux 0.7.2` (only published version) has signatures that don't
# match `record_platform_interface 1.5.x` — `flutter build apk` fails on
# missing `startStream` + mismatched `hasPermission` even though we don't
# ship Linux. Pointing record_linux to a local stub package skips the
# broken upstream entirely. Drop this override once upstream publishes a
# record_linux 0.8.x that compiles against platform_interface 1.5.x.
dependency_overrides:
  record_linux:
    path: packages/record_linux_stub

flutter:
  uses-material-design: true
  assets:
    - assets/

